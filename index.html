<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billetera Virtual - Visor JSON</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f9fafb;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #4b5563;
            --code-bg: #1e1e2e;
            --code-text: #cdd6f4;
            --border: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 8px;
            color: var(--text-main);
            text-align: center;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
            text-align: center;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.2);
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Div contenedor del resultado JSON */
        #result-container {
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--code-bg);
            color: var(--code-text);
            padding: 20px;
            min-height: 80px;
            font-family: "Fira Code", Consolas, Monaco, "Andale Mono", "Ubuntu Mono", monospace;
            font-size: 13px;
            line-height: 1.5;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            transition: all 0.3s ease;
        }

        .placeholder-text {
            color: #6c7086;
            text-align: center;
            font-style: italic;
            margin: 0;
        }

        .error-text {
            color: #f38ba8;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Billetera Virtual</h1>
        <p>Presiona el botón para consultar la lista de usuarios desde la API.</p>
        
        <div class="btn-container">
            <button id="btn-cargar" class="btn">Cargar Usuarios</button>
        </div>

        <div id="result-container">
            <p class="placeholder-text">Los datos de los usuarios se mostrarán aquí en formato JSON.</p>
        </div>
    </div>

    <script>
        document.getElementById('btn-cargar').addEventListener('click', async () => {
            const container = document.getElementById('result-container');
            container.innerHTML = '<p class="placeholder-text">Cargando...</p>';
            
            try {
                const response = await fetch('/api/leer');
                if (!response.ok) {
                    throw new Error(`Error en el servidor: ${response.status} ${response.statusText}`);
                }
                const data = await response.json();
                
                // Mostrar el resultado JSON formateado dentro del div
                container.textContent = JSON.stringify(data, null, 4);
            } catch (error) {
                container.innerHTML = `<p class="error-text">Ocurrió un error al cargar los usuarios:<br>${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
