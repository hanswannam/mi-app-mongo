<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billetera Virtual - Panel Admin</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F8FAFC;
            --surface: #ffffff;
            --text: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --accent: #FF6B00;
            --accent-hover: #E65F00;
            --accent-ink: #ffffff;
            --danger: #EF4444;
            --danger-bg: #FEF2F2;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 24px 80px;
        }

        .shell {
            max-width: 920px;
            margin: 0 auto;
        }

        a.volver {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.01em;
            margin: 16px 0 4px;
        }

        h2 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            font-weight: 600;
            margin: 0 0 16px;
        }

        section {
            margin-top: 48px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
        }

        .tabla-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 560px;
            border-collapse: collapse;
            font-size: 13px;
        }

        @media (max-width: 540px) {
            body {
                padding: 28px 16px 64px;
            }
        }

        th, td {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn {
            background-color: var(--accent);
            color: var(--accent-ink);
            border: none;
            padding: 7px 12px;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            border-color: var(--text);
        }

        .btn-danger {
            background: var(--danger-bg);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .acciones-fila {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .placeholder-text {
            color: var(--text-muted);
            font-style: italic;
        }

        .form-categoria {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .form-categoria input {
            flex: 1;
            font-family: inherit;
            font-size: 16px;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .form-categoria {
            flex-wrap: wrap;
        }

        .lista-categorias {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .pill-categoria {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 6px 6px 12px;
        }

        .pill-categoria button {
            border: none;
            background: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            padding: 0 4px;
        }

        .resumen-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 14px;
        }

        .resumen-box {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
        }

        .resumen-box .num {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.01em;
        }

        .resumen-box .label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .graficas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
        }

        .grafica-box h3 {
            font-size: 13px;
            font-weight: 700;
            margin: 0 0 12px;
        }

        .barra-fila {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .barra-mes {
            width: 48px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .barra-track {
            flex: 1;
            background: var(--bg);
            border-radius: 6px;
            height: 16px;
            overflow: hidden;
        }

        .barra-fill {
            background: var(--accent);
            height: 100%;
            border-radius: 6px;
        }

        .barra-total {
            width: 28px;
            text-align: right;
            font-weight: 600;
            flex-shrink: 0;
        }

        .avatar-mini-admin {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            vertical-align: middle;
            background: var(--bg);
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="shell">
        <p><a class="volver" href="/">← Volver a la app</a></p>
        <h1>Panel de administrador</h1>
        <p class="placeholder-text" style="margin: 0;">Usuarios y categorías de Billetera Virtual.</p>

        <section>
            <h2>Resumen general</h2>
            <div id="resumen-contenido"><p class="placeholder-text">Cargando...</p></div>
        </section>

        <section>
            <h2>Métricas mensuales</h2>
            <div id="graficas-contenido"><p class="placeholder-text">Cargando...</p></div>
        </section>

        <section>
            <h2>Usuarios registrados</h2>
            <div id="usuarios-contenido"><p class="placeholder-text">Cargando...</p></div>
        </section>

        <section>
            <h2>Categorías de empresas</h2>
            <form class="form-categoria" id="form-categoria">
                <input type="text" id="input-categoria" placeholder="Nueva categoría...">
                <button type="submit" class="btn">Agregar</button>
            </form>
            <div id="categorias-contenido"><p class="placeholder-text">Cargando...</p></div>
        </section>
    </div>

    <script>
        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"']/g, (c) => ({
                "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
            }[c]));
        }

        // --- Resumen general y métricas ---

        function renderResumen(r) {
            const contenido = document.getElementById("resumen-contenido");
            const boxes = [
                ["Usuarios registrados", r.totalUsuarios],
                ["Tarjetas creadas", r.totalTarjetas],
                ["Tarjetas activas", r.totalTarjetasActivas],
                ["Tarjetas compartidas", r.totalTarjetasCompartidas],
                ["Escaneos OCR", r.totalEscaneosOcr],
                ["Invitaciones pendientes", r.totalInvitacionesPendientes]
            ];
            contenido.innerHTML = `
                <div class="resumen-grid">
                    ${boxes.map(([label, num]) => `
                        <div class="resumen-box">
                            <div class="num">${num}</div>
                            <div class="label">${escapeHtml(label)}</div>
                        </div>
                    `).join("")}
                </div>
            `;
        }

        function renderMiniGrafica(titulo, serie) {
            if (serie.length === 0) {
                return `<div class="grafica-box"><h3>${escapeHtml(titulo)}</h3><p class="placeholder-text" style="font-size:12px;">Sin datos todavía.</p></div>`;
            }
            const maximo = Math.max(...serie.map((p) => p.total), 1);
            return `
                <div class="grafica-box">
                    <h3>${escapeHtml(titulo)}</h3>
                    ${serie.map((p) => `
                        <div class="barra-fila">
                            <span class="barra-mes">${escapeHtml(p.mes)}</span>
                            <span class="barra-track"><span class="barra-fill" style="width:${(p.total / maximo) * 100}%;"></span></span>
                            <span class="barra-total">${p.total}</span>
                        </div>
                    `).join("")}
                </div>
            `;
        }

        function renderGraficas(r) {
            document.getElementById("graficas-contenido").innerHTML = `
                <div class="graficas-grid">
                    ${renderMiniGrafica("Usuarios nuevos por mes", r.usuariosPorMes)}
                    ${renderMiniGrafica("Tarjetas creadas por mes", r.tarjetasPorMes)}
                    ${renderMiniGrafica("Tarjetas compartidas por mes", r.compartidosPorMes)}
                    ${renderMiniGrafica("Activaciones por mes", r.activacionesPorMes)}
                </div>
            `;
        }

        async function cargarResumen() {
            try {
                const r = await fetch("/api/admin/resumen");
                if (!r.ok) throw new Error(`Error ${r.status}`);
                const data = await r.json();
                renderResumen(data);
                renderGraficas(data);
            } catch (error) {
                document.getElementById("resumen-contenido").innerHTML = `<p class="placeholder-text">Error al cargar el resumen: ${escapeHtml(error.message)}</p>`;
                document.getElementById("graficas-contenido").innerHTML = "";
            }
        }

        // --- Usuarios ---

        function renderUsuarios(usuarios) {
            const contenido = document.getElementById("usuarios-contenido");

            if (usuarios.length === 0) {
                contenido.innerHTML = '<p class="placeholder-text">No hay usuarios registrados.</p>';
                return;
            }

            contenido.innerHTML = `
                <div class="tabla-wrap">
                    <table>
                        <thead>
                            <tr><th></th><th>Teléfono</th><th>Nombre</th><th>Empresa</th><th>Correo</th><th>Rol</th><th>Estado</th><th>Registrado</th><th>Último acceso</th><th></th></tr>
                        </thead>
                        <tbody>
                            ${usuarios.map((u) => `
                                <tr>
                                    <td>${u.avatarMini ? `<img class="avatar-mini-admin" src="${u.avatarMini}" alt="">` : ""}</td>
                                    <td>${escapeHtml(u.telefono)}</td>
                                    <td>${escapeHtml(u.nombre)}</td>
                                    <td>${escapeHtml(u.empresa || "—")}</td>
                                    <td>${escapeHtml(u.email || "—")}</td>
                                    <td>${escapeHtml(u.rol)}</td>
                                    <td>${u.estado === "suspendido" ? "Suspendido" : "Activo"}</td>
                                    <td>${new Date(u.creadoEn).toLocaleDateString("es-GT")}</td>
                                    <td>${u.ultimoAcceso ? new Date(u.ultimoAcceso).toLocaleDateString("es-GT") : "—"}</td>
                                    <td>
                                        <div class="acciones-fila">
                                            <button class="btn btn-outline" data-editar-nombre="${escapeHtml(u.telefono)}">Editar nombre</button>
                                            <button class="btn btn-outline" data-reset-dpi="${escapeHtml(u.telefono)}">Resetear DPI</button>
                                            <button class="btn" data-cambiar-rol="${escapeHtml(u.telefono)}" data-rol="${escapeHtml(u.rol)}">
                                                ${u.rol === "admin" ? "Quitar admin" : "Hacer admin"}
                                            </button>
                                            <button class="btn ${u.estado === "suspendido" ? "" : "btn-danger"}" data-cambiar-estado="${escapeHtml(u.telefono)}" data-estado="${escapeHtml(u.estado || "activo")}">
                                                ${u.estado === "suspendido" ? "Activar" : "Suspender"}
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                </div>
            `;

            contenido.querySelectorAll("button[data-cambiar-rol]").forEach((btn) => {
                btn.addEventListener("click", async () => {
                    const telefono = btn.dataset.cambiarRol;
                    const nuevoRol = btn.dataset.rol === "admin" ? "usuario" : "admin";
                    btn.disabled = true;
                    try {
                        const r = await fetch(`/api/admin/usuarios/${encodeURIComponent(telefono)}/rol`, {
                            method: "PATCH",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ rol: nuevoRol })
                        });
                        const data = await r.json();
                        if (!r.ok) throw new Error(data.error || "No se pudo actualizar el rol.");
                        await cargarUsuarios();
                    } catch (error) {
                        alert(error.message);
                        btn.disabled = false;
                    }
                });
            });

            contenido.querySelectorAll("button[data-cambiar-estado]").forEach((btn) => {
                btn.addEventListener("click", async () => {
                    const telefono = btn.dataset.cambiarEstado;
                    const nuevoEstado = btn.dataset.estado === "suspendido" ? "activo" : "suspendido";
                    if (nuevoEstado === "suspendido" && !confirm("¿Suspender a este usuario? No podrá iniciar sesión hasta que lo reactives.")) return;
                    btn.disabled = true;
                    try {
                        const r = await fetch(`/api/admin/usuarios/${encodeURIComponent(telefono)}/estado`, {
                            method: "PATCH",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ estado: nuevoEstado })
                        });
                        const data = await r.json();
                        if (!r.ok) throw new Error(data.error || "No se pudo actualizar el estado.");
                        await cargarUsuarios();
                    } catch (error) {
                        alert(error.message);
                        btn.disabled = false;
                    }
                });
            });

            contenido.querySelectorAll("button[data-editar-nombre]").forEach((btn) => {
                btn.addEventListener("click", async () => {
                    const telefono = btn.dataset.editarNombre;
                    const nombreNuevo = prompt("Nuevo nombre para este usuario:");
                    if (!nombreNuevo) return;
                    try {
                        const r = await fetch(`/api/admin/usuarios/${encodeURIComponent(telefono)}`, {
                            method: "PUT",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ nombre: nombreNuevo })
                        });
                        const data = await r.json();
                        if (!r.ok) throw new Error(data.error || "No se pudo actualizar el nombre.");
                        await cargarUsuarios();
                    } catch (error) {
                        alert(error.message);
                    }
                });
            });

            contenido.querySelectorAll("button[data-reset-dpi]").forEach((btn) => {
                btn.addEventListener("click", async () => {
                    const telefono = btn.dataset.resetDpi;
                    const dpiNuevo = prompt("Nuevo DPI (contraseña) para este usuario:");
                    if (!dpiNuevo) return;
                    try {
                        const r = await fetch(`/api/admin/usuarios/${encodeURIComponent(telefono)}`, {
                            method: "PUT",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ dpiNuevo })
                        });
                        const data = await r.json();
                        if (!r.ok) throw new Error(data.error || "No se pudo actualizar el DPI.");
                        alert("DPI actualizado.");
                    } catch (error) {
                        alert(error.message);
                    }
                });
            });
        }

        async function cargarUsuarios() {
            const contenido = document.getElementById("usuarios-contenido");
            try {
                const r = await fetch("/api/admin/usuarios");
                if (r.status === 401) {
                    contenido.innerHTML = '<p class="placeholder-text">Debes iniciar sesión. <a href="/">Ir al login</a></p>';
                    return;
                }
                if (r.status === 403) {
                    contenido.innerHTML = '<p class="placeholder-text">No tienes permisos de administrador.</p>';
                    return;
                }
                if (!r.ok) throw new Error(`Error ${r.status}`);
                renderUsuarios(await r.json());
            } catch (error) {
                contenido.innerHTML = `<p class="placeholder-text">Error al cargar usuarios: ${escapeHtml(error.message)}</p>`;
            }
        }

        // --- Categorías ---

        function renderCategorias(categorias) {
            const contenido = document.getElementById("categorias-contenido");

            if (categorias.length === 0) {
                contenido.innerHTML = '<p class="placeholder-text">No hay categorías todavía.</p>';
                return;
            }

            contenido.innerHTML = `
                <div class="lista-categorias">
                    ${categorias.map((c) => `
                        <span class="pill-categoria">
                            ${escapeHtml(c.nombre)}
                            <button type="button" data-eliminar-categoria="${c._id}" title="Eliminar">×</button>
                        </span>
                    `).join("")}
                </div>
            `;

            contenido.querySelectorAll("button[data-eliminar-categoria]").forEach((btn) => {
                btn.addEventListener("click", async () => {
                    if (!confirm("¿Eliminar esta categoría?")) return;
                    try {
                        const r = await fetch(`/api/admin/categorias/${btn.dataset.eliminarCategoria}`, { method: "DELETE" });
                        const data = await r.json();
                        if (!r.ok) throw new Error(data.error || "No se pudo eliminar.");
                        await cargarCategorias();
                    } catch (error) {
                        alert(error.message);
                    }
                });
            });
        }

        async function cargarCategorias() {
            const contenido = document.getElementById("categorias-contenido");
            try {
                const r = await fetch("/api/categorias");
                if (!r.ok) throw new Error(`Error ${r.status}`);
                renderCategorias(await r.json());
            } catch (error) {
                contenido.innerHTML = `<p class="placeholder-text">Error al cargar categorías: ${escapeHtml(error.message)}</p>`;
            }
        }

        document.getElementById("form-categoria").addEventListener("submit", async (e) => {
            e.preventDefault();
            const input = document.getElementById("input-categoria");
            const nombre = input.value.trim();
            if (!nombre) return;
            try {
                const r = await fetch("/api/admin/categorias", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ nombre })
                });
                const data = await r.json();
                if (!r.ok) throw new Error(data.error || "No se pudo agregar la categoría.");
                input.value = "";
                await cargarCategorias();
            } catch (error) {
                alert(error.message);
            }
        });

        cargarResumen();
        cargarUsuarios();
        cargarCategorias();
    </script>
</body>
</html>
