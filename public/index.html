<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billetera Virtual - Tarjetas de Presentación</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Billetera">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f9fafb;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #4b5563;
            --border: #e5e7eb;
            --error: #b91c1c;
            --error-bg: #fef2f2;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 720px;
            width: 100%;
            margin: 0 auto;
        }

        .panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-bottom: 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 4px;
            color: var(--text-main);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 24px;
        }

        h2 {
            font-size: 16px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 16px;
        }

        h3 {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            margin: 20px 0 10px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 16px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field.full {
            grid-column: 1 / -1;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }

        input, textarea {
            font-family: inherit;
            font-size: 14px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg);
            color: var(--text-main);
            box-sizing: border-box;
        }

        input[type="file"] {
            padding: 8px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-secondary:hover {
            background-color: #eef2ff;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .search-input {
            flex: 1;
        }

        .form-message {
            font-size: 13px;
            margin-bottom: 12px;
            padding: 10px 12px;
            border-radius: 8px;
        }

        .form-message.error {
            color: var(--error);
            background-color: var(--error-bg);
        }

        .form-message.success {
            color: #166534;
            background-color: #f0fdf4;
        }

        .previews {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }

        .previews img {
            max-width: 110px;
            max-height: 70px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .tarjetas-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tarjeta-card {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
        }

        .tarjeta-imagenes {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .tarjeta-imagenes img {
            max-width: 160px;
            max-height: 100px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid var(--border);
            cursor: zoom-in;
        }

        .tarjeta-nombre {
            font-size: 16px;
            font-weight: 700;
            margin: 0 0 2px;
        }

        .tarjeta-meta {
            font-size: 13px;
            color: var(--text-muted);
            margin: 0 0 10px;
        }

        .tarjeta-acciones {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .tarjeta-acciones a {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            text-decoration: none;
            color: var(--primary);
            background-color: #eef2ff;
            border-radius: 999px;
            padding: 6px 12px;
        }

        .tarjeta-acciones a:hover {
            background-color: #e0e7ff;
        }

        .tarjeta-notas {
            font-size: 13px;
            color: var(--text-muted);
            margin: 0;
            white-space: pre-wrap;
        }

        .placeholder-text {
            color: #9ca3af;
            text-align: center;
            font-style: italic;
            margin: 12px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel">
            <h1>Billetera Virtual</h1>
            <p class="subtitle">Guarda y consulta tus tarjetas de presentación.</p>

            <h2>Agregar tarjeta</h2>
            <div id="form-message"></div>
            <form id="form-tarjeta">
                <div class="form-grid">
                    <div class="field">
                        <label for="nombre">Nombre *</label>
                        <input id="nombre" name="nombre" type="text" required>
                    </div>
                    <div class="field">
                        <label for="empresa">Empresa</label>
                        <input id="empresa" name="empresa" type="text">
                    </div>
                    <div class="field">
                        <label for="cargo">Cargo</label>
                        <input id="cargo" name="cargo" type="text">
                    </div>
                    <div class="field">
                        <label for="telefono">Teléfono</label>
                        <input id="telefono" name="telefono" type="tel">
                    </div>
                    <div class="field">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email">
                    </div>
                    <div class="field">
                        <label for="sitioWeb">Sitio web</label>
                        <input id="sitioWeb" name="sitioWeb" type="text">
                    </div>
                    <div class="field full">
                        <label for="notas">Notas</label>
                        <textarea id="notas" name="notas"></textarea>
                    </div>
                </div>

                <h3>Foto de la tarjeta</h3>
                <div class="form-grid">
                    <div class="field">
                        <label for="imagenFrente">Frente</label>
                        <input id="imagenFrente" name="imagenFrente" type="file" accept="image/*">
                    </div>
                    <div class="field">
                        <label for="imagenReverso">Reverso (si la tarjeta tiene dos lados)</label>
                        <input id="imagenReverso" name="imagenReverso" type="file" accept="image/*">
                    </div>
                </div>
                <div class="previews" id="previews"></div>

                <h3>Redes sociales (opcional)</h3>
                <div class="form-grid">
                    <div class="field">
                        <label for="facebook">Facebook</label>
                        <input id="facebook" name="facebook" type="text" placeholder="usuario o URL">
                    </div>
                    <div class="field">
                        <label for="instagram">Instagram</label>
                        <input id="instagram" name="instagram" type="text" placeholder="usuario o URL">
                    </div>
                    <div class="field">
                        <label for="linkedin">LinkedIn</label>
                        <input id="linkedin" name="linkedin" type="text" placeholder="usuario o URL">
                    </div>
                    <div class="field">
                        <label for="tiktok">TikTok</label>
                        <input id="tiktok" name="tiktok" type="text" placeholder="usuario o URL">
                    </div>
                    <div class="field">
                        <label for="twitter">X / Twitter</label>
                        <input id="twitter" name="twitter" type="text" placeholder="usuario o URL">
                    </div>
                </div>

                <button type="submit" class="btn" id="btn-guardar" style="margin-top: 8px;">Guardar Tarjeta</button>
            </form>
        </div>

        <div class="panel">
            <div class="list-header">
                <h2 style="margin-bottom: 0;">Tarjetas guardadas</h2>
                <button type="button" class="btn btn-secondary" id="btn-actualizar">Actualizar</button>
            </div>
            <input class="search-input" id="buscador" type="text" placeholder="Buscar por nombre o empresa...">
            <div id="tarjetas-container" style="margin-top: 16px;">
                <p class="placeholder-text">Cargando tarjetas...</p>
            </div>
        </div>
    </div>

    <script>
        let tarjetas = [];
        let imagenFrenteBase64 = "";
        let imagenReversoBase64 = "";

        const REDES = [
            { campo: "facebook", etiqueta: "Facebook", icono: "📘", base: "https://facebook.com/" },
            { campo: "instagram", etiqueta: "Instagram", icono: "📸", base: "https://instagram.com/" },
            { campo: "linkedin", etiqueta: "LinkedIn", icono: "💼", base: "https://linkedin.com/in/" },
            { campo: "tiktok", etiqueta: "TikTok", icono: "🎵", base: "https://tiktok.com/@" },
            { campo: "twitter", etiqueta: "X", icono: "✖️", base: "https://x.com/" }
        ];

        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"']/g, (c) => ({
                "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
            }[c]));
        }

        function comprimirImagen(file, maxAncho = 1200, calidad = 0.75) {
            return new Promise((resolve, reject) => {
                const lector = new FileReader();
                lector.onerror = () => reject(new Error("No se pudo leer la imagen."));
                lector.onload = () => {
                    const img = new Image();
                    img.onerror = () => reject(new Error("El archivo seleccionado no es una imagen válida."));
                    img.onload = () => {
                        const escala = Math.min(1, maxAncho / img.width);
                        const canvas = document.createElement("canvas");
                        canvas.width = Math.round(img.width * escala);
                        canvas.height = Math.round(img.height * escala);
                        const ctx = canvas.getContext("2d");
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL("image/jpeg", calidad));
                    };
                    img.src = lector.result;
                };
                lector.readAsDataURL(file);
            });
        }

        function actualizarPreviews() {
            const contenedor = document.getElementById("previews");
            const imgs = [imagenFrenteBase64, imagenReversoBase64].filter(Boolean);
            contenedor.innerHTML = imgs.map((src) => `<img src="${src}" alt="Vista previa">`).join("");
        }

        document.getElementById("imagenFrente").addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) { imagenFrenteBase64 = ""; actualizarPreviews(); return; }
            try {
                imagenFrenteBase64 = await comprimirImagen(file);
            } catch (error) {
                document.getElementById("form-message").innerHTML = `<p class="form-message error">${escapeHtml(error.message)}</p>`;
                imagenFrenteBase64 = "";
            }
            actualizarPreviews();
        });

        document.getElementById("imagenReverso").addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) { imagenReversoBase64 = ""; actualizarPreviews(); return; }
            try {
                imagenReversoBase64 = await comprimirImagen(file);
            } catch (error) {
                document.getElementById("form-message").innerHTML = `<p class="form-message error">${escapeHtml(error.message)}</p>`;
                imagenReversoBase64 = "";
            }
            actualizarPreviews();
        });

        function whatsappUrl(telefono) {
            const digitos = (telefono || "").replace(/\D/g, "");
            if (!digitos) return null;
            const conCodigo = digitos.length <= 8 ? `502${digitos}` : digitos;
            const mensaje = encodeURIComponent("Hola, nos contactamos por tu tarjeta de presentación.");
            return `https://wa.me/${conCodigo}?text=${mensaje}`;
        }

        function urlRedSocial(red, valor) {
            if (!valor) return null;
            const v = valor.trim();
            if (/^https?:\/\//i.test(v)) return v;
            return red.base + v.replace(/^@/, "");
        }

        function renderTarjetas(filtro) {
            const container = document.getElementById("tarjetas-container");
            const filtroLower = filtro.trim().toLowerCase();

            const visibles = tarjetas.filter((t) => {
                if (!filtroLower) return true;
                return (t.nombre || "").toLowerCase().includes(filtroLower) ||
                       (t.empresa || "").toLowerCase().includes(filtroLower);
            });

            if (visibles.length === 0) {
                container.innerHTML = '<p class="placeholder-text">No hay tarjetas para mostrar.</p>';
                return;
            }

            container.innerHTML = visibles.map((t) => {
                const metaParts = [t.cargo, t.empresa].filter(Boolean).map(escapeHtml);

                const imagenes = [t.imagenFrente, t.imagenReverso].filter(Boolean);
                const imagenesHtml = imagenes.length
                    ? `<div class="tarjeta-imagenes">${imagenes.map((src) => `<img src="${src}" alt="Tarjeta de ${escapeHtml(t.nombre)}" onclick="window.open(this.src, '_blank')">`).join("")}</div>`
                    : "";

                const acciones = [];
                const wa = whatsappUrl(t.telefono);
                if (wa) acciones.push(`<a href="${wa}" target="_blank" rel="noopener">💬 WhatsApp</a>`);
                if (t.telefono) acciones.push(`<a href="tel:${escapeHtml(t.telefono)}">📞 Llamar</a>`);
                if (t.email) acciones.push(`<a href="mailto:${escapeHtml(t.email)}">✉️ Email</a>`);
                if (t.sitioWeb) acciones.push(`<a href="${escapeHtml(t.sitioWeb)}" target="_blank" rel="noopener">🌐 Sitio web</a>`);
                REDES.forEach((red) => {
                    const url = urlRedSocial(red, t[red.campo]);
                    if (url) acciones.push(`<a href="${escapeHtml(url)}" target="_blank" rel="noopener">${red.icono} ${red.etiqueta}</a>`);
                });

                return `
                    <div class="tarjeta-card">
                        ${imagenesHtml}
                        <p class="tarjeta-nombre">${escapeHtml(t.nombre)}</p>
                        ${metaParts.length ? `<p class="tarjeta-meta">${metaParts.join(" · ")}</p>` : ""}
                        ${acciones.length ? `<div class="tarjeta-acciones">${acciones.join("")}</div>` : ""}
                        ${t.notas ? `<p class="tarjeta-notas">${escapeHtml(t.notas)}</p>` : ""}
                    </div>
                `;
            }).join("");
        }

        async function cargarTarjetas() {
            const container = document.getElementById("tarjetas-container");
            container.innerHTML = '<p class="placeholder-text">Cargando tarjetas...</p>';
            try {
                const response = await fetch("/api/tarjetas");
                if (!response.ok) {
                    throw new Error(`Error en el servidor: ${response.status} ${response.statusText}`);
                }
                tarjetas = await response.json();
                renderTarjetas(document.getElementById("buscador").value);
            } catch (error) {
                container.innerHTML = `<p class="placeholder-text">Ocurrió un error al cargar las tarjetas: ${escapeHtml(error.message)}</p>`;
            }
        }

        document.getElementById("btn-actualizar").addEventListener("click", cargarTarjetas);
        document.getElementById("buscador").addEventListener("input", (e) => renderTarjetas(e.target.value));

        document.getElementById("form-tarjeta").addEventListener("submit", async (e) => {
            e.preventDefault();
            const form = e.target;
            const btn = document.getElementById("btn-guardar");
            const messageBox = document.getElementById("form-message");
            messageBox.innerHTML = "";

            const datos = {
                nombre: form.nombre.value,
                empresa: form.empresa.value,
                cargo: form.cargo.value,
                telefono: form.telefono.value,
                email: form.email.value,
                sitioWeb: form.sitioWeb.value,
                notas: form.notas.value,
                facebook: form.facebook.value,
                instagram: form.instagram.value,
                linkedin: form.linkedin.value,
                tiktok: form.tiktok.value,
                twitter: form.twitter.value,
                imagenFrente: imagenFrenteBase64,
                imagenReverso: imagenReversoBase64
            };

            btn.disabled = true;
            btn.textContent = "Guardando...";

            try {
                const response = await fetch("/api/tarjetas", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(datos)
                });
                const resultado = await response.json();

                if (!response.ok) {
                    throw new Error(resultado.error || `Error en el servidor: ${response.status}`);
                }

                form.reset();
                imagenFrenteBase64 = "";
                imagenReversoBase64 = "";
                actualizarPreviews();
                messageBox.innerHTML = '<p class="form-message success">Tarjeta guardada correctamente.</p>';
                await cargarTarjetas();
            } catch (error) {
                messageBox.innerHTML = `<p class="form-message error">${escapeHtml(error.message)}</p>`;
            } finally {
                btn.disabled = false;
                btn.textContent = "Guardar Tarjeta";
            }
        });

        cargarTarjetas();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch((err) => {
                    console.error('Error registrando el service worker:', err);
                });
            });
        }
    </script>
</body>
</html>
